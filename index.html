<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incidente</title>
    <style>
        /* Estilos generales minimalistas */
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 30px 20px;
            color: #333;
        }

        /* Encabezado del reporte */
        .encabezado {
            text-align: center;
            margin-bottom: 40px;
        }

        .encabezado h1 {
            margin: 0;
            color: #1a252f;
            font-size: 28px;
            font-weight: 600;
        }

        .encabezado p {
            color: #5c6a79;
            margin-top: 8px;
            font-size: 15px;
        }

        /* Cuadrícula para organizar los gráficos */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* El mapa ocupa las dos columnas enteras */
        .mapa-completo {
            grid-column: 1 / -1; 
        }

        /* Diseño de las tarjetas que contienen los gráficos */
        .tarjeta {
            background: #ffffff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .titulo-tarjeta {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef0f2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Ajustes de los iframes */
        iframe {
            width: 100%;
            border: none;
            border-radius: 4px;
            background-color: #f9fafb; /* Fondo sutil por si tarda en cargar */
        }

        /* Alturas personalizadas */
        .iframe-alto { height: 500px; }
        .iframe-medio { height: 380px; }

        /* Adaptabilidad para pantallas pequeñas (celulares) */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="encabezado">
        <h1>Incidente</h1>
        <p>Análisis de Expansión territorial y demografía</p>
    </header>

    <main class="dashboard-grid">
        
        <div class="tarjeta mapa-completo">
            <div class="titulo-tarjeta">🗺️ Mapa Interactivo</div>
            <iframe class="iframe-alto" src="situacion/graficos/mapa.html" title="Mapa de Incidentes"></iframe>
        </div>

        <div class="tarjeta">
            <div class="titulo-tarjeta">📊 Distribución por Sexo</div>
            <iframe class="iframe-medio" src="situacion/graficos/grafico_sexo.html" title="Distribución por Sexo"></iframe>
        </div>

        <div class="tarjeta">
            <div class="titulo-tarjeta">📈 Tercer Gráfico</div>
            <iframe class="iframe-medio" src="situacion/graficos/tercer_grafico.html" title="Tercer Gráfico"></iframe>
        </div>

    </main>

</body>
</html>

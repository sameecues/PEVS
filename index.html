<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relevamiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {

            --body-bg: #f1f5f9;
            --card-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.85);
            --primary-text: #0f172a;
            --secondary-text: #64748b;
            --card-title-text: #1e293b;
            
            --accent-color: #06b6d4; /* Turquesa */
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #06b6d4); /* Violeta a Turquesa */
            
            --iframe-placeholder-bg: #f8fafc;
            --border-color: #e2e8f0;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --card-hover-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
            
            --border-radius: 16px;
            --grid-gap: 24px;
            --main-max-width: 1350px;
        }

        body.dark-mode {
            /* Modo Oscuro */
            --body-bg: #0b1121;
            --card-bg: #1e293b;
            --header-bg: rgba(30, 41, 59, 0.85);
            --primary-text: #f8fafc;
            --secondary-text: #94a3b8;
            --card-title-text: #e2e8f0;
            
            --accent-color: #22d3ee; 
            --accent-gradient: linear-gradient(135deg, #a78bfa, #22d3ee);
            
            --iframe-placeholder-bg: #0f172a;
            --border-color: #334155;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --card-hover-shadow: 0 15px 25px -5px rgba(0, 0, 0, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--body-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary-text); }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--body-bg);
            margin: 0;
            color: var(--primary-text);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Encabezado con Glassmorphism */
        .encabezado {
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 40px;
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: background-color 0.4s ease, border-bottom 0.4s ease;
        }

        .header-content {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            max-width: var(--main-max-width);
            margin: 0 auto;
        }

        .header-left { display: flex; justify-content: flex-start; }
        .header-center { text-align: center; display: flex; flex-direction: column; }
        .header-right { display: flex; justify-content: flex-end; align-items: center; gap: 24px; }

        .logo-left, .logo-right {
            height: 45px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.05));
        }

        .header-center h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-center p {
            color: var(--secondary-text);
            margin: 4px 0 0 0;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* Botón de Tema */
        .btn-theme-toggle {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--primary-text);
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            padding: 0;
            box-shadow: var(--card-shadow); 
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-theme-toggle:hover { 
            border-color: var(--accent-color); 
            color: var(--accent-color); 
            transform: translateY(-2px) scale(1.05); 
            box-shadow: var(--card-hover-shadow);
        }

        /* Cuadrícula */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--grid-gap);
            max-width: var(--main-max-width);
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .mapa-completo { grid-column: 1 / -1; }

        /* Tarjetas */
        .tarjeta {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 28px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.4s ease, border-color 0.4s ease;
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
        }

        .tarjeta:hover {
            transform: translateY(-4px);
            box-shadow: var(--card-hover-shadow);
        }

        /* Animación en cascada para las tarjetas */
        .tarjeta:nth-child(1) { animation-delay: 0.1s; }
        .tarjeta:nth-child(2) { animation-delay: 0.2s; }
        .tarjeta:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .titulo-tarjeta {
            font-size: 17px;
            font-weight: 700;
            color: var(--card-title-text);
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        /* Línea de acento debajo del título */
        .titulo-tarjeta::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 35px;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 4px;
        }

        .titulo-icon {
            font-size: 20px;
            background-color: var(--iframe-placeholder-bg);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        /* Contenedores de iFrames */
        iframe {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--iframe-placeholder-bg);
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .iframe-alto { height: 550px; }
        .iframe-medio { height: 420px; }

        /* Adaptabilidad para móviles */
        @media (max-width: 900px) {
            .encabezado { padding: 15px 20px; }
            
            .header-content { 
                grid-template-columns: 1fr 1fr; 
                grid-template-rows: auto auto;
                gap: 15px;
            }
            .header-left { justify-content: flex-start; order: 1; }
            .header-right { justify-content: flex-end; order: 2; gap: 15px;}
            .header-center {
                grid-column: 1 / -1;
                order: 3;
                text-align: center;
                margin-top: 5px;
            }
            .header-center h1 { font-size: 28px; }
            
            .dashboard-grid { grid-template-columns: 1fr; padding: 0 15px 40px; gap: 20px; }
            
            .tarjeta { padding: 20px; }
            .iframe-alto { height: 400px; }
            .iframe-medio { height: 350px; }
        }
    </style>
</head>
<body>

    <header class="encabezado">
        <div class="header-content">
            
            <div class="header-left">
                <!-- Reemplaza el src con la ruta real de tu logo izquierdo -->
                <img src="https://i.imgur.com/GXTFolo.png" alt="Logo Institución" class="logo-left">
            </div>

            <div class="header-center">
                <h1>Relevamiento</h1>
                <p>Análisis de Expansión Territorial y Demografía</p>
            </div>

            <div class="header-right">
                <button id="theme-toggle" class="btn-theme-toggle" aria-label="Cambiar tema" title="Modo Claro / Oscuro">
                    <svg id="icon-sun" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <img src="https://i.imgur.com/W5Mo4rc.png" alt="Logo Entidad" class="logo-right">
            </div>

        </div>
    </header>

    <main class="dashboard-grid">
        <div class="tarjeta mapa-completo">
            <div class="titulo-tarjeta">
                <span class="titulo-icon">🗺️</span> Mapa Interactivo
            </div>
            <iframe class="iframe-alto" src="graficos/mapa.html" title="Mapa de Incidentes"></iframe>
        </div>

        <div class="tarjeta">
            <div class="titulo-tarjeta">
                <span class="titulo-icon">📊</span> Perfil Demográfico
            </div>
            <iframe class="iframe-medio" src="graficos/grafico_sexo.html" title="Distribución por Sexo"></iframe>
        </div>

        <div class="tarjeta">
            <div class="titulo-tarjeta">
                <span class="titulo-icon">📈</span> Tendencias y Métricas
            </div>
            <iframe class="iframe-medio" src="graficos/tercer_grafico.html" title="Tercer Gráfico"></iframe>
        </div>
    </main>

    <script>
        const body = document.body;
        const themeToggle = document.getElementById('theme-toggle');
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');

        // Función para cambiar los iconos
        function updateIcons() {
            if (body.classList.contains('dark-mode')) {
                iconSun.style.display = 'block';
                iconMoon.style.display = 'none';
            } else {
                iconSun.style.display = 'none';
                iconMoon.style.display = 'block';
            }
        }

        // Cargar preferencia guardada
        const savedTheme = localStorage.getItem('theme');
        // Preferencia de sistema operativo si no hay nada guardado
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            body.classList.add('dark-mode');
        }
        
        updateIcons();

        // Evento de click para cambiar tema
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            updateIcons();

            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark');
            } else {
                localStorage.setItem('theme', 'light');
            }
        });
    </script>
</body>
</html>
